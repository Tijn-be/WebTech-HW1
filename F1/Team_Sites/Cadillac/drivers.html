<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drivers Cadillac</title>
    <link rel="icon" type="Image/png" href="assets/images/CadillacLogo.png" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="canonical" href="drivers.html" />
  </head>
  <body>
    <header>
      <div class="site-header__bar">
        <a href="../../index.html">
          <h1>Cadillac</h1>
        </a>
        <img
          id="Cadillac"
          src="assets/images/Cadillac.png"
          alt="Cadillac logo" />
      </div>

      <nav class="site-nav" aria-label="Main navigation">
        <a class="site-nav__link" href="index.html">Home</a>
        <a class="site-nav__link" href="drivers.html" style="color: red" aria-current="page">Drivers</a>
        <a class="site-nav__link" href="teamprofile.html">Team Profile</a>
        <a class="site-nav__link" href="statistics.html">Statistics</a>
        <a class="site-nav__link" href="cars.html">Cars</a>
        <a class="site-nav__link" href="teams.html">Teams</a>
      </nav>

      <div class="slider-container">
        <input id="slider-car" type="range" min="0" max="100" value="0" />
        <img
          id="slider-img"
          src="assets/images/Cadillac_car.png"
          alt="Cadillac car" />
      </div>
    </header>

    <main>
      <section aria-labelledby="drivers-title">
        <h2 id="drivers-title">Cadillac Drivers</h2>
      </section>

      <section id="driversUploadArea" class="upload-panel">
        <h2>Load Drivers</h2>

        <label for="driversFileInput">Select JSON file:</label>
        <input
          type="file"
          id="driversFileInput"
          accept=".json,application/json"
          aria-describedby="driversFileHelp" />
        <p id="driversFileHelp">
          Upload <strong>driversData.json</strong> to load drivers.
        </p>
      </section>

      <p
        id="propagationStatus"
        class="propagation-status"
        aria-live="polite"></p>

      <div id="driversList" class="content-row" aria-live="polite"></div>
    </main>

    <footer>
      <a id="about" href="../../About.html">About</a> Author: Benjamin, Darryl,
      Tijn<br />
      Disclaimer: Information on this website is not guaranteed to be
      correct.<br />
      © 2026 Cadillac F1 Team<br />
    </footer>

    <script src="assets/js/script.js"></script>
  </body>
</html>
