  <head>

    <title>About F1</title>
    <link rel="icon" type="image/png" href="assets/images/F1logo.png" />

    <main>
      <section id="uploadArea" class="upload-panel">
        <h2>Load Group Members</h2>

        <label for="fileInput">Select JSON file:</label>
        <input
          type="file"
          id="fileInput"
          accept=".json,application/json"
          aria-describedby="fileHelp" />
        <p id="fileHelp">
          Upload <strong>groupMembers.json</strong> to load group members.
        </p>
      </section>

      <div id="playerContainer" class="player-grid" aria-live="polite"></div>
